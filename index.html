<body>

    <button class="cyber-reset-btn-fixed" onclick="resetTamagotchi()">
        🔄<br>RESET
    </button>

    <div class="music-btn-container">
        <button id="music-btn" class="cyber-music-btn-fixed" onclick="toggleMusic()">
            🎵<br><span id="music-btn-text">PLAY</span>

        <div class="audio-bubble show">로고송을 재생해보세요!</div>

    <nav class="button-navigation">

    <script>
        // BGM 재생 및 일시정지 제어 함수 (말풍선 제어 로직 추가)
        function toggleMusic() {
            const bgm = document.getElementById('bgm');
            const musicBtn = document.getElementById('music-btn');
            const btnText = document.getElementById('music-btn-text');
            const bubble = document.querySelector('.audio-bubble');

            if (bgm.paused) {
                bgm.play();
                musicBtn.innerHTML = '⏸️<br><span id="music-btn-text">PAUSE</span>';
                if (bubble) bubble.classList.remove('show'); // 재생 중일 때 말풍선 숨김
            } else {
                bgm.pause();
                musicBtn.innerHTML = '🎵<br><span id="music-btn-text">PLAY</span>';
                if (bubble) bubble.classList.add('show');    // 정지 중일 때 말풍선 다시 표시
            }
        }
    </script>

    <section class="video-card-section">

        </div>
        <div class="introduction-item checked-active">

            <label>인공지능, 컴퓨터 비전, 웹/앱 서비스 등의 캡스톤 설계 프로젝트를 수행</label>
        </div>
        <div class="introduction-item checked-active">
            <div class="bullet-glow"></div>

        </div>
    </section>

    <audio id="bgm" loop>
